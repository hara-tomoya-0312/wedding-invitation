<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>結婚式のご招待</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Hiragino Kaku Gothic Pro", "メイリオ", sans-serif;
      background: linear-gradient(135deg, #ffe8f2 0%, #fff0cc 50%, #d9f7ff 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      width: min(100%, 760px);
      background: #ffffffee;
      border-radius: 28px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.12);
      overflow: hidden;
      position: relative;
      padding: 40px;
    }

    .balloons {
      position: absolute;
      top: -10px;
      right: -10px;
      font-size: 2rem;
      color: #ff86c9;
      opacity: 0.85;
    }

    .balloons::before,
    .balloons::after {
      content: "🎈";
      position: absolute;
    }

    .balloons::before {
      top: 0;
      right: 0;
      font-size: 2.4rem;
    }

    .balloons::after {
      top: 1.2rem;
      right: 2.8rem;
      font-size: 1.8rem;
    }

    h1 {
      font-size: clamp(2rem, 4vw, 3.4rem);
      color: #ff6b9e;
      text-align: center;
      letter-spacing: 0.05em;
      margin-bottom: 18px;
    }

    .subtitle {
      text-align: center;
      color: #666;
      font-size: 1rem;
      margin-bottom: 32px;
    }

    .section {
      display: grid;
      gap: 20px;
    }

    .section p {
      font-size: 1.05rem;
      color: #444;
      line-height: 1.8;
    }

    .section strong {
      color: #d92b7e;
    }

    .info-card {
      background: #fff5ff;
      border: 1px solid #ffd4ec;
      border-radius: 20px;
      padding: 20px;
      box-shadow: inset 0 0 0 1px rgba(255, 146, 178, 0.2);
    }

    .info-card div {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 0.98rem;
      color: #5a4a6d;
      margin-bottom: 12px;
    }

    .info-card div:last-child {
      margin-bottom: 0;
    }

    .shiba-runner {
      position: absolute;
      bottom: 10px;
      left: -180px;
      width: 180px;
      height: 120px;
      animation: shibaRun 8s linear infinite;
      pointer-events: none;
    }

    .shiba {
      position: absolute;
      width: 180px;
      height: 120px;
      animation: shibaBounce 0.5s ease-in-out infinite alternate;
    }

    .shiba-body {
      position: absolute;
      left: 40px;
      top: 38px;
      width: 90px;
      height: 54px;
      background: #fff;
      border: 4px solid #d8d8d8;
      border-radius: 50px 50px 40px 40px;
      box-shadow: inset 0 0 0 1px rgba(215, 215, 215, 0.8);
    }

    .shiba-head {
      position: absolute;
      left: 0;
      top: 20px;
      width: 64px;
      height: 62px;
      background: #fff;
      border: 4px solid #d8d8d8;
      border-radius: 50% 50% 48% 48%;
    }

    .shiba-head::before {
      content: "";
      position: absolute;
      left: 16px;
      top: 24px;
      width: 32px;
      height: 16px;
      border-radius: 0 0 20px 20px;
      background: #f6d7df;
    }

    .ear {
      position: absolute;
      width: 20px;
      height: 24px;
      background: #fff;
      border: 4px solid #d8d8d8;
      border-radius: 50% 50% 40% 40%;
      top: 6px;
    }

    .ear--left {
      left: 6px;
      transform: rotate(-15deg);
    }

    .ear--right {
      left: 32px;
      transform: rotate(15deg);
    }

    .shiba-eye {
      position: absolute;
      top: 34px;
      width: 8px;
      height: 8px;
      background: #4d4d4d;
      border-radius: 50%;
    }

    .shiba-eye.left {
      left: 14px;
    }

    .shiba-eye.right {
      left: 42px;
    }

    .shiba-nose {
      position: absolute;
      left: 29px;
      top: 44px;
      width: 10px;
      height: 8px;
      background: #4d4d4d;
      border-radius: 50% 50% 40% 40%;
    }

    .shiba-tail {
      position: absolute;
      right: 0;
      top: 14px;
      width: 34px;
      height: 34px;
      border: 4px solid #d8d8d8;
      background: #fff;
      border-radius: 40px 40px 40px 0;
      transform: rotate(40deg);
    }

    .shiba-leg {
      position: absolute;
      width: 14px;
      height: 28px;
      background: #d8d8d8;
      border-radius: 10px;
      bottom: 0;
    }

    .leg--front {
      left: 60px;
    }

    .leg--back {
      right: 20px;
    }

    .shiba-cheek {
      position: absolute;
      width: 10px;
      height: 10px;
      background: #f8c7d3;
      border-radius: 50%;
      top: 44px;
    }

    .cheek--left {
      left: 12px;
    }

    .cheek--right {
      left: 40px;
    }

    @keyframes shibaRun {
      0% { left: -220px; }
      100% { left: calc(100% + 220px); }
    }

    @keyframes shibaBounce {
      0% { transform: translateY(0); }
      100% { transform: translateY(-8px); }
    }

    .rsvp {
      text-align: center;
      margin-top: 52px;
    }

    .rsvp button {
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, #ff9ede, #ff6489);
      color: white;
      padding: 16px 28px;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 12px 24px rgba(255, 100, 150, 0.25);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .rsvp button:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 28px rgba(255, 100, 150, 0.3);
    }

    .thanks {
      margin-top: 18px;
      text-align: center;
      color: #a0588c;
      font-size: 0.95rem;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="balloons"></div>
    <h1>結婚式のご招待</h1>
    <p class="subtitle">大切なあなたへ、ふたりの特別な日にぜひご参加ください。</p>

    <section class="section">
      <p><strong>新郎:</strong> 原智也（はら ともや）</p>
      <p><strong>新婦:</strong> 池江彩花（いけえ さやか）</p>
      <p>ふたりはこれまでの感謝を込めて、日々支えてくださった皆さまをお招きし、結婚式を執り行います。あたたかい笑顔とともに、幸せなひとときを分かち合えたら嬉しいです。</p>
    </section>

    <div class="info-card">
      <div><span>日付</span><span>2026年11月2日（月）</span></div>
      <div><span>時間</span><span>開場 14:00 / 開始 15:00</span></div>
      <div><span>会場</span><span>広島 宮島</span></div>
      <div><span>住所</span><span>広島県廿日市市宮島町</span></div>
    </div>

    <div class="shiba-runner" aria-hidden="true">
      <div class="shiba">
        <div class="shiba-body"></div>
        <div class="shiba-head"></div>
        <div class="ear ear--left"></div>
        <div class="ear ear--right"></div>
        <div class="shiba-eye left"></div>
        <div class="shiba-eye right"></div>
        <div class="shiba-nose"></div>
        <div class="shiba-tail"></div>
        <div class="shiba-leg leg--front"></div>
        <div class="shiba-leg leg--back"></div>
        <div class="shiba-cheek cheek--left"></div>
        <div class="shiba-cheek cheek--right"></div>
      </div>
    </div>

    <div class="rsvp">
      <button id="rsvpBtn" type="button">出欠を返信する</button>
      <p class="thanks" id="thanksText">出欠の返信ありがとうございます！</p>
    </div>
  </div>

  <script>
    document.getElementById("rsvpBtn").addEventListener("click", function () {
      const thanks = document.getElementById("thanksText");
      thanks.style.opacity = "1";
      this.textContent = "返信済み";
      this.disabled = true;
    });
  </script>
</body>
</html>
