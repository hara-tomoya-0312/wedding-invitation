<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>結婚式のご招待</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "MS PGothic", "Hiragino Kaku Gothic Pro", sans-serif;
      background: linear-gradient(45deg, #ffb3d9 0%, #ffcc99 50%, #99ccff 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      image-rendering: pixelated;
    }

    .container {
      width: min(100%, 720px);
      background: #fff;
      border: 8px solid #333;
      box-shadow: 12px 12px 0 rgba(0, 0, 0, 0.3);
      padding: 32px;
      position: relative;
    }

    .title {
      text-align: center;
      margin-bottom: 28px;
      position: relative;
    }

    h1 {
      font-size: 2.2rem;
      color: #ff1493;
      text-shadow: 4px 4px 0 #ffb3d9, -2px -2px 0 #fff;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }

    .stars {
      font-size: 1.8rem;
      letter-spacing: 8px;
      color: #ffcc00;
      animation: twinkle 0.6s infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .window {
      background: #ffebf5;
      border: 4px solid #ff1493;
      padding: 16px;
      margin: 16px 0;
      position: relative;
    }

    .window::before {
      content: "";
      position: absolute;
      top: -8px;
      left: 12px;
      width: 24px;
      height: 12px;
      background: #ff1493;
    }

    .window::after {
      content: "";
      position: absolute;
      top: -8px;
      right: 12px;
      width: 24px;
      height: 12px;
      background: #ff1493;
    }

    .label {
      font-weight: bold;
      color: #ff1493;
      font-size: 0.9rem;
      margin-bottom: 4px;
    }

    .text {
      font-size: 1rem;
      color: #333;
      line-height: 1.6;
      margin: 8px 0;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      margin: 12px 0;
      font-size: 0.95rem;
      color: #333;
    }

    .couple {
      display: flex;
      gap: 32px;
      justify-content: center;
      margin: 16px 0;
      font-size: 0.9rem;
    }

    .couple-item {
      text-align: center;
    }

    .couple-item .emoji {
      font-size: 2.4rem;
      margin: 8px 0;
    }

    .rsvp {
      text-align: center;
      margin-top: 28px;
    }

    .rsvp button {
      background: linear-gradient(to bottom, #ffcc00, #ff9900);
      border: 4px solid #333;
      color: #333;
      padding: 12px 28px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 6px 6px 0 rgba(0, 0, 0, 0.2);
      transition: all 0.1s;
      font-family: "MS PGothic", sans-serif;
      letter-spacing: 1px;
    }

    .rsvp button:hover {
      transform: translate(-2px, -2px);
      box-shadow: 8px 8px 0 rgba(0, 0, 0, 0.2);
    }

    .rsvp button:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 rgba(0, 0, 0, 0.2);
    }

    .thanks {
      margin-top: 16px;
      font-size: 0.9rem;
      color: #ff1493;
      font-weight: bold;
      opacity: 0;
      transition: opacity 0.3s;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">
      <h1>結婚式のご招待</h1>
      <div class="stars">✦ ✦ ✦</div>
    </div>

    <div class="window">
      <div class="label">新郎新婦</div>
      <div class="couple">
        <div class="couple-item">
          <div class="emoji">👰</div>
          <p>新婦: 池江彩花</p>
          <p style="font-size: 0.85rem;">(いけえ さやか)</p>
        </div>
        <div class="couple-item">
          <div class="emoji">🤵</div>
          <p>新郎: 原智也</p>
          <p style="font-size: 0.85rem;">(はら ともや)</p>
        </div>
      </div>
    </div>

    <div class="window">
      <div class="label">開式情報</div>
      <div class="info-row">
        <span>日付</span>
        <span>2026年11月2日（月）</span>
      </div>
      <div class="info-row">
        <span>時間</span>
        <span>開場 14:00 / 開始 15:00</span>
      </div>
      <div class="info-row">
        <span>会場</span>
        <span>広島 宮島</span>
      </div>
      <div class="info-row">
        <span>住所</span>
        <span>広島県廿日市市宮島町</span>
      </div>
    </div>

    <div class="window">
      <div class="text">ふたりはこれまでの感謝を込めて、日々支えてくださった皆さまをお招きし、結婚式を執り行います。あたたかい笑顔とともに、幸せなひとときを分かち合えたら嬉しいです。</div>
    </div>

    <div class="rsvp">
      <button id="rsvpBtn" type="button">出欠を返信する</button>
      <p class="thanks" id="thanksText">出欠の返信ありがとうございます！</p>
    </div>
  </div>

  <script>
    document.getElementById("rsvpBtn").addEventListener("click", function () {
      const thanks = document.getElementById("thanksText");
      thanks.style.opacity = "1";
      this.textContent = "返信済み";
      this.disabled = true;
    });
  </script>
</body>
</html>
