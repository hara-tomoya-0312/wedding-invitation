<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>結婚式のご招待</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Hiragino Kaku Gothic Pro", "メイリオ", sans-serif;
      background: linear-gradient(135deg, #ffe8f2 0%, #fff0cc 50%, #d9f7ff 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      width: min(100%, 760px);
      background: #ffffffee;
      border-radius: 28px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.12);
      overflow: hidden;
      position: relative;
      padding: 40px;
    }

    .balloons {
      position: absolute;
      top: -10px;
      right: -10px;
      font-size: 2rem;
      color: #ff86c9;
      opacity: 0.85;
    }

    .balloons::before,
    .balloons::after {
      content: "🎈";
      position: absolute;
    }

    .balloons::before {
      top: 0;
      right: 0;
      font-size: 2.4rem;
    }

    .balloons::after {
      top: 1.2rem;
      right: 2.8rem;
      font-size: 1.8rem;
    }

    h1 {
      font-size: clamp(2rem, 4vw, 3.4rem);
      color: #ff6b9e;
      text-align: center;
      letter-spacing: 0.05em;
      margin-bottom: 18px;
    }

    .subtitle {
      text-align: center;
      color: #666;
      font-size: 1rem;
      margin-bottom: 32px;
    }

    .section {
      display: grid;
      gap: 20px;
    }

    .section p {
      font-size: 1.05rem;
      color: #444;
      line-height: 1.8;
    }

    .section strong {
      color: #d92b7e;
    }

    .info-card {
      background: #fff5ff;
      border: 1px solid #ffd4ec;
      border-radius: 20px;
      padding: 20px;
      box-shadow: inset 0 0 0 1px rgba(255, 146, 178, 0.2);
    }

    .info-card div {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 0.98rem;
      color: #5a4a6d;
      margin-bottom: 12px;
    }

    .info-card div:last-child {
      margin-bottom: 0;
    }

    .rsvp {
      text-align: center;
      margin-top: 32px;
    }

    .rsvp button {
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, #ff9ede, #ff6489);
      color: white;
      padding: 16px 28px;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 12px 24px rgba(255, 100, 150, 0.25);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .rsvp button:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 28px rgba(255, 100, 150, 0.3);
    }

    .thanks {
      margin-top: 18px;
      text-align: center;
      color: #a0588c;
      font-size: 0.95rem;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="balloons"></div>
    <h1>結婚式のご招待</h1>
    <p class="subtitle">大切なあなたへ、ふたりの特別な日にぜひご参加ください。</p>

    <section class="section">
      <p><strong>新郎:</strong> 太郎</p>
      <p><strong>新婦:</strong> 花子</p>
      <p>ふたりはこれまでの感謝を込めて、日々支えてくださった皆さまをお招きし、結婚式を執り行います。あたたかい笑顔とともに、幸せなひとときを分かち合えたら嬉しいです。</p>
    </section>

    <div class="info-card">
      <div><span>日付</span><span>2026年10月10日（土）</span></div>
      <div><span>時間</span><span>開場 14:00 / 開始 15:00</span></div>
      <div><span>会場</span><span>さくらガーデンホール</span></div>
      <div><span>住所</span><span>東京都渋谷区桜丘町</span></div>
    </div>

    <div class="rsvp">
      <button id="rsvpBtn" type="button">出欠を返信する</button>
      <p class="thanks" id="thanksText">出欠の返信ありがとうございます！</p>
    </div>
  </div>

  <script>
    document.getElementById("rsvpBtn").addEventListener("click", function () {
      const thanks = document.getElementById("thanksText");
      thanks.style.opacity = "1";
      this.textContent = "返信済み";
      this.disabled = true;
    });
  </script>
</body>
</html>
